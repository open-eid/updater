name: CI
on: [push, pull_request]
env:
  BUILD_NUMBER: ${{ github.run_number }}
  CMAKE_BUILD_PARALLEL_LEVEL: 4
jobs:
  macos:
    name: Build on macOS
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: 13.0
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build
      run: |
        cmake -S . -B build -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_BUILD_TYPE=RelWithDebInfo
        cmake --build build --target pkgbuild
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: macOS
        path: build/*.pkg
  windows:
    name: Build on Windows
    runs-on: windows-2022
    strategy:
      matrix:
        vcver: [143]
        platform: [x64, arm64]
    env:
      VER_SUFFIX: .VS${{ matrix.vcver }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Cache vcpkg
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ matrix.vcver }}-${{ matrix.platform }}-${{ hashFiles('vcpkg.json') }}
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.11.1
        arch: ${{ matrix.platform == 'arm64' && 'win64_msvc2022_arm64_cross_compiled' || 'win64_msvc2022_64' }}
        cache: true
        aqtsource: git+https://github.com/miurahr/aqtinstall.git
    - name: Install WiX
      run: |
        dotnet tool install -g wix --version 6.0.2
        wix extension -g add WixToolset.UI.wixext/6.0.2
    - name: Build
      shell: cmd
      env:
        VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_cache,readwrite
      run: |
        for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find VC\Auxiliary\Build\vcvarsall.bat`) do call "%%i" ${{ matrix.platform == 'arm64' && 'amd64_arm64' || 'amd64' }}
        set QT_HOST_PATH=%QT_HOST_PATH:\=/%
        cmake -A ${{ matrix.platform }} -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
          -DVCPKG_TARGET_TRIPLET=${{ matrix.platform }}-windows ^
          ${{ matrix.platform == 'arm64' && '-DQT_HOST_PATH=%QT_HOST_PATH%' || '' }}
        cmake --build build --target installer
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: msi_${{ matrix.vcver }}_${{ matrix.platform }}
        path: build/*.msi
